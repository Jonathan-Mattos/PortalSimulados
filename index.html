<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Simulados - Firjan Senai</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("CD0ssGoTAYPFXsSRJ");
       })();
    </script>
    <style>
        :root {
            --primary-blue: #211fb4;
            --dark-blue: #131442;
            --accent-blue: #15b3d9;
            --white: #ffffff;
            --correct-green: #27ae60;
            --wrong-red: #d63031;
            --sidebar-btn: #34495e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-blue);
            margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none;
        }

        /* Responsividade Básica */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100% !important; height: auto !important; }
            .main-content { padding: 20px 10px !important; }
            .quiz-container { padding: 15px !important; }
            .timer-badge { position: relative !important; top: 0 !important; right: 0 !important; display: block; margin-bottom: 10px; text-align: center; }
        }

        .sidebar {
            width: 300px; background: var(--dark-blue); color: white;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header { padding: 25px 20px; text-align: center; background: rgba(0,0,0,0.2); }
        .btn-home {
            margin-top: 15px; width: 100%; padding: 10px; background: var(--sidebar-btn); 
            color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        .menu-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .category-btn {
            width: 100%; padding: 12px; background: none; border: none; color: white;
            text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between;
        }

        .subcategory-list { display: none; padding-left: 15px; }
        .subcategory-list.active { display: block; }
        .simulado-link { display: block; color: #adb5bd; text-decoration: none; padding: 8px; font-size: 0.85rem; }
        .simulado-link:hover { color: white; background: var(--primary-blue); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow-y: auto; }
        .quiz-container {
            background: var(--white); width: 100%; max-width: 850px; border-radius: 12px;
            padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); position: relative; box-sizing: border-box;
        }

        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .timer-badge { position: absolute; top: 20px; right: 30px; background: #eee; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: var(--wrong-red); }
        .question-text { font-size: 1.1rem; font-weight: 600; color: #333; margin-bottom: 20px; line-height: 1.4; }

        .option-card {
            padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px;
            cursor: pointer; transition: 0.2s; word-wrap: break-word;
        }
        .option-card:hover { border-color: var(--primary-blue); background: #f0f4ff; }
        .option-card.selected { border-color: var(--primary-blue); background: #e0e7ff; font-weight: bold; }

        .btn-action { padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--correct-green); color: white; }
        .review-box { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid var(--wrong-red); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>PORTAL SENAI</h2>
            <button onclick="goHome()" class="btn-home">🏠 VOLTAR AO INÍCIO</button>
        </div>
        <div class="menu-container">
            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('bd-menu')">BANCO DE DADOS <span>▼</span></button>
                <div id="bd-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('SEU_LINK_AQUI', 'Banco de Dados - Simulado 1')">Simulado 1</a>
                </div>
            </div>
            </div>
    </div>

    <div class="main-content">
        <div id="welcome-msg" style="text-align:center; color:white;">
            <h2>Escolha um simulado para começar.</h2>
        </div>

        <div class="quiz-container" id="quiz-ui" style="display: none;">
            <div id="user-form" style="text-align: center;">
                <h2 style="color: var(--primary-blue);">Identificação</h2>
                <input type="text" id="student-name" class="input-field" placeholder="Nome Completo">
                <input type="email" id="student-email" class="input-field" placeholder="E-mail">
                <button class="btn-action" onclick="startQuizFlow()">INICIAR</button>
            </div>

            <div id="quiz-actual-content" style="display: none;">
                <div class="timer-badge">⏳ <span id="timer">02:00:00</span></div>
                <h2 id="current-title" style="color: var(--primary-blue);"></h2>
                <div id="loading-status" style="display:none; color: var(--accent-blue);">Carregando questões...</div>

                <div id="quiz-core">
                    <div id="questionNumber" style="color: #888; margin-bottom: 5px;"></div>
                    <div class="question-text" id="questionText"></div>
                    <div id="optionsGrid"></div>
                    <div style="margin-top: 30px; display: flex; justify-content: space-between; gap: 10px;">
                        <button class="btn-action" style="background:#666" onclick="prevQ()">Anterior</button>
                        <button class="btn-action" id="next-btn" onclick="nextQ()">Próxima</button>
                        <button class="btn-action" id="finish-btn" style="display:none; background: var(--dark-blue);" onclick="finishQuiz()">Finalizar</button>
                    </div>
                </div>

                <div id="result-screen" style="display:none;">
                    <canvas id="scoreChart" style="max-height: 180px; margin: 0 auto;"></canvas>
                    <h3 id="score-text" style="text-align:center;"></h3>
                    <div id="review-area"></div>
                    <p id="mail-status" style="text-align:center; font-weight:bold;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = [], currentIdx = 0, answers = [], timeLeft = 7200, timerInt;
        let userData = { name: "", email: "" }, currentUrl = "", currentTitle = "";

        function toggleMenu(id) {
            document.querySelectorAll('.subcategory-list').forEach(m => m.id !== id && m.classList.remove('active'));
            document.getElementById(id).classList.toggle('active');
        }

        function goHome() {
            location.reload(); // Forma mais segura de resetar tudo
        }

        function setupSimulado(url, titulo) {
            currentUrl = url;
            currentTitle = titulo;
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'block';
        }

        async function startQuizFlow() {
            userData.name = document.getElementById('student-name').value;
            userData.email = document.getElementById('student-email').value;
            if(userData.name.length < 5 || !userData.email.includes("@")) return alert("Dados inválidos");
            
            document.getElementById('user-form').style.display = 'none';
            document.getElementById('quiz-actual-content').style.display = 'block';
            loadData(currentUrl);
        }

        async function loadData(url) {
            document.getElementById('loading-status').style.display = 'block';
            document.getElementById('quiz-core').style.display = 'none';
            
            try {
                const csvUrl = url.replace('/pubhtml', '/pub?output=csv');
                const res = await fetch(csvUrl + "&t=" + Date.now());
                const csv = await res.text();
                
                const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                questions = lines.slice(1).map(line => {
                    let parts = [], curr = "", inQ = false;
                    for (let char of line) {
                        if (char === '"') inQ = !inQ;
                        else if (char === ',' && !inQ) { parts.push(curr); curr = ""; }
                        else curr += char;
                    }
                    parts.push(curr);

                    if (parts.length >= 6) {
                        const clean = (s) => s.replace(/""/g, '"').replace(/^"|"$/g, '').trim();
                        return {
                            q: clean(parts[0]),
                            options: [clean(parts[1]), clean(parts[2]), clean(parts[3]), clean(parts[4])],
                            correct: parseInt(clean(parts[5])),
                            exp: parts[6] ? clean(parts[6]) : ""
                        };
                    }
                    return null;
                }).filter(x => x);

                answers = new Array(questions.length).fill(null);
                document.getElementById('loading-status').style.display = 'none';
                document.getElementById('quiz-core').style.display = 'block';
                document.getElementById('current-title').innerText = currentTitle;
                startTimer(); renderQ();
            } catch (e) { alert("Erro ao ler planilha."); }
        }

        function startTimer() {
            timerInt = setInterval(() => {
                let h = Math.floor(timeLeft/3600), m = Math.floor((timeLeft%3600)/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(timeLeft-- <= 0) finishQuiz();
            }, 1000);
        }

        function renderQ() {
            const q = questions[currentIdx];
            document.getElementById('questionNumber').innerText = `Questão ${currentIdx+1}/${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = "";
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = `option-card ${answers[currentIdx] === i ? 'selected' : ''}`;
                div.innerText = `${String.fromCharCode(65+i)}) ${opt}`;
                div.onclick = () => { answers[currentIdx] = i; renderQ(); };
                grid.appendChild(div);
            });
            document.getElementById('next-btn').style.display = currentIdx === questions.length-1 ? 'none' : 'block';
            document.getElementById('finish-btn').style.display = currentIdx === questions.length-1 ? 'block' : 'none';
        }

        function nextQ() { currentIdx++; renderQ(); }
        function prevQ() { if(currentIdx > 0) { currentIdx--; renderQ(); } }

        function finishQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-core').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0, html = "";
            questions.forEach((q, i) => {
                if(answers[i] === q.correct) score++;
                else {
                    html += `<div class="review-box"><strong>${i+1}. ${q.q}</strong><br>
                    <small>Sua: ${q.options[answers[i]] || 'Pulei'} | Correta: ${q.options[q.correct]}</small></div>`;
                }
            });
            const p = (score/questions.length)*100;
            document.getElementById('score-text').innerText = `${score}/${questions.length} (${p.toFixed(1)}%)`;
            document.getElementById('review-area').innerHTML = html;

            new Chart(document.getElementById('scoreChart'), {
                type: 'doughnut',
                data: { labels: ['Acertos','Erros'], datasets: [{ data: [score, questions.length-score], backgroundColor: ['#27ae60','#d63031'] }] }
            });

            // Envio EmailJS
            document.getElementById('mail-status').innerText = "Enviando relatório...";
            emailjs.send('service_a9t3y5q', 'template_w7hgwhu', {
                student_name: userData.name,
                student_email: userData.email,
                subject: currentTitle,
                result: `${score}/${questions.length} (${p.toFixed(1)}%)`,
                status: p >= 80 ? "APROVADO" : "REPROVADO"
            }).then(() => document.getElementById('mail-status').innerText = "✅ Relatório enviado!")
              .catch(() => document.getElementById('mail-status').innerText = "❌ Erro no envio. Avise o professor.");
        }
    </script>
</body>
</html>
