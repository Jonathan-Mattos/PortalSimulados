<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Simulados - Firjan Senai Caxias</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("CD0ssGoTAYPFXsSRJ");
       })();
    </script>
    <style>
        :root {
            --primary-blue: #211fb4;
            --dark-blue: #131442;
            --accent-blue: #15b3d9;
            --white: #ffffff;
            --correct-green: #27ae60;
            --wrong-red: #d63031;
            --gray: #f4f7f6;
            --sidebar-btn: #34495e;
        }

        body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background-color: var(--primary-blue);
          margin: 0; 
          display: flex; 
          height: 100vh; 
          overflow: hidden; 
          user-select: none;
        }

        /* --- BARRA LATERAL --- */
        .sidebar {
            width: 300px; background: var(--dark-blue); color: white;
            display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .sidebar-header { padding: 25px 20px; text-align: center; background: rgba(0,0,0,0.2); }
        .sidebar-header h2 { font-size: 1.2rem; margin: 0; letter-spacing: 1px; }

        .btn-home {
            margin-top: 15px; width: 100%; padding: 10px; 
            background-color: var(--sidebar-btn); color: white; 
            border: none; border-radius: 6px; cursor: pointer; 
            font-weight: bold; font-size: 0.8rem;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-home:hover { background-color: #2c3e50; transform: scale(1.02); }

        .menu-container { 
            flex-grow: 1; overflow-y: auto; padding: 15px; padding-right: 8px;
            scrollbar-width: thin; scrollbar-color: var(--sidebar-btn) rgba(0,0,0,0.2);
        }
        .menu-container::-webkit-scrollbar { width: 6px; }
        .menu-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .menu-container::-webkit-scrollbar-thumb { background: var(--sidebar-btn); border-radius: 10px; }
        .menu-container::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        .category-item { margin-bottom: 8px; }
        .category-btn {
            width: 100%; padding: 12px 15px; background: none; border: none;
            color: white; text-align: left; font-weight: bold; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 6px; transition: 0.3s; font-size: 0.85rem;
        }
        .category-btn:hover { background: rgba(255,255,255,0.1); }

        .subcategory-list { display: none; padding-left: 15px; margin-top: 5px; }
        .subcategory-list.active { display: block; }

        .simulado-link {
            display: block; color: #adb5bd; text-decoration: none; padding: 8px;
            font-size: 0.85rem; border-radius: 4px; transition: 0.2s;
        }
        .simulado-link:hover { color: white; background: var(--primary-blue); }

        /* --- ÁREA CENTRAL --- */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; padding: 40px 20px; overflow-y: auto;
        }

        .quiz-container {
            background: var(--white);
            width: 100%;
            max-width: 850px;
            height: auto;                
            min-height: fit-content;    
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            margin-bottom: 50px;
            box-sizing: border-box;
        }

        .input-field {
            width: 80%; padding: 12px; margin-bottom: 15px; 
            border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;
        }

        .timer-badge {
            position: absolute; top: 20px; right: 30px;
            background: #eee; padding: 8px 15px; border-radius: 20px;
            font-weight: bold; color: var(--wrong-red);
        }

        .question-text { font-size: 1.2rem; font-weight: 600; color: #333; margin-bottom: 20px; }

        .option-card {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: block;             
            height: auto !important;     
            min-height: 50px;
            word-wrap: break-word;       
            overflow-wrap: break-word;
            white-space: normal;         
            line-height: 1.5;
            box-sizing: border-box;
        }
        .option-card:hover { border-color: var(--primary-blue); background: #f0f4ff; transform: translateX(5px); }
        .option-card.selected { border-color: var(--primary-blue); background: #e0e7ff; font-weight: bold; }

        .btn-action {
            padding: 12px 25px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; background: var(--correct-green); color: white;
            transition: 0.2s;
        }
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }

        #welcome-msg { text-align: center; color: white; width: 100%; }
        .header-logo { max-width: 100%; height: auto; }
        .review-box { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid var(--wrong-red); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .sidebar-header { padding: 15px; }
            .menu-container { max-height: 250px; }
            .main-content { padding: 20px 10px; height: auto; overflow-y: visible; }
            .quiz-container { padding: 20px; margin-bottom: 20px; }
            .timer-badge { position: static; display: inline-block; margin-bottom: 15px; width: fit-content; }
            .input-field { width: 95%; }
            .question-text { font-size: 1.05rem; }
            .btn-action { padding: 10px 15px; font-size: 0.9rem; }
            #scoreChart { max-width: 100%; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>PORTAL SENAI</h2>
            <p style="font-size: 0.8rem; opacity: 0.7;">Simulados de Avaliação</p>
            <button onclick="goHome()" class="btn-home">🏠 VOLTAR AO INÍCIO</button>
        </div>
        
        <div class="menu-container">
            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('eletro-menu')">ELETROELETRÔNICA APLICADA <span>▼</span></button>
                <div id="eletro-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_1', 'Eletro - Simulado 1')">Simulado 1</a>
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_2', 'Eletro - Simulado 2')">Simulado 2</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('logica-menu')">LÓGICA DE PROGRAMAÇÃO <span>▼</span></button>
                <div id="logica-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_3', 'Lógica - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('modelagem-menu')">MODELAGEM DE SISTEMAS <span>▼</span></button>
                <div id="modelagem-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_4', 'Modelagem - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('bd-menu')">BANCO DE DADOS <span>▼</span></button>
                <div id="bd-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('https://docs.google.com/spreadsheets/d/e/2PACX-1vT9XNps8c6jUHWhOzqpRnTD-rkdMI9Y-ZE11sk-OQrGmUtOOhjBFxuAT-z2zduB47CXd7tvn3DcmJyJ/pub?output=csv', 'Banco de Dados - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('dev-sist-menu')">DESENVOLVIMENTO DE SISTEMAS <span>▼</span></button>
                <div id="dev-sist-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_5', 'Dev. Sistemas - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('teste-menu')">TESTE DE SISTEMAS <span>▼</span></button>
                <div id="teste-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_6', 'Teste - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('mobile-menu')">DEV. DE APLICATIVO MOBILE <span>▼</span></button>
                <div id="mobile-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_7', 'Mobile - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('iot-menu')">INTERNET DAS COISAS <span>▼</span></button>
                <div id="iot-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_8', 'IoT - Simulado 1')">Simulado 1</a>
                </div>
            </div>

            <div class="category-item">
                <button class="category-btn" onclick="toggleMenu('manutencao-menu')">IMPLANTAÇÃO E MANUTENÇÃO <span>▼</span></button>
                <div id="manutencao-menu" class="subcategory-list">
                    <a href="#" class="simulado-link" onclick="setupSimulado('LINK_9', 'Manutenção - Simulado 1')">Simulado 1</a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="welcome-msg">
            <img src="PortalSAEP.png" height="275" width="512" alt="Portal SAEP - SENAI CAXIAS" class="header-logo">
            <h2>Escolha uma disciplina ao lado para começar seu teste.</h2>
        </div>

        <div class="quiz-container" id="quiz-ui" style="display: none;">
            <div id="user-form" style="text-align: center; padding: 20px;">
                <h2 style="color: var(--primary-blue);">Identificação Obrigatória</h2>
                <input type="text" id="student-name" class="input-field" placeholder="Seu Nome Completo">
                <input type="email" id="student-email" class="input-field" placeholder="Seu E-mail">
                <br>
                <button class="btn-action" onclick="startQuizFlow()">INICIAR TESTE</button>
            </div>

            <div id="quiz-actual-content" style="display: none;">
                <div class="timer-badge">⏳ <span id="timer">02:00:00</span></div>
                <h2 id="current-title" style="color: var(--primary-blue); margin-top: 0;"></h2>
                <div id="loading-status" style="display:none; font-weight: bold; color: var(--accent-blue);">Buscando questões...</div>

                <div id="quiz-core">
                    <div id="questionNumber" style="color: #888; margin-bottom: 5px;"></div>
                    <div class="question-text" id="questionText"></div>
                    <div id="optionsGrid"></div>
                    <div style="margin-top: 30px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                        <button class="btn-action" style="background:#666" onclick="prevQ()">Anterior</button>
                        <button class="btn-action" id="next-btn" onclick="nextQ()">Próxima</button>
                        <button class="btn-action" id="finish-btn" style="display:none; background: var(--dark-blue);" onclick="finishQuiz()">Finalizar e Enviar</button>
                    </div>
                </div>

                <div id="result-screen" style="display:none; text-align: center;">
                    <h2>Simulado Concluído</h2>
                    <canvas id="scoreChart" style="max-height: 200px; margin: 0 auto;"></canvas>
                    <h3 id="score-text"></h3>
                    <div id="feedback-msg"></div>
                    <p id="mail-status" style="font-style: italic; color: #555;"></p>
                    <div id="review-area" style="text-align: left; margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = [], currentIdx = 0, answers = [], timeLeft = 7200, timerInt;
        let userData = { name: "", email: "" }, currentUrl = "", currentTitle = "";

        function toggleMenu(id) {
            document.querySelectorAll('.subcategory-list').forEach(m => {
                if(m.id !== id) m.classList.remove('active');
            });
            document.getElementById(id).classList.toggle('active');
        }

        function goHome() {
            clearInterval(timerInt);
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('welcome-msg').style.display = 'block';
            document.querySelectorAll('.subcategory-list').forEach(m => m.classList.remove('active'));
        }

        function setupSimulado(url, titulo) {
            if(!url || url.includes('LINK_')) return alert("Link da planilha não configurado.");
            currentUrl = url;
            currentTitle = titulo;
            
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('user-form').style.display = 'block';
            document.getElementById('quiz-actual-content').style.display = 'none';
            document.getElementById('student-name').value = "";
            document.getElementById('student-email').value = "";
        }

        async function startQuizFlow() {
            const name = document.getElementById('student-name').value;
            const email = document.getElementById('student-email').value;

            if(name.trim().length < 5 || !email.includes("@")) {
                return alert("Preencha seu nome completo e um e-mail válido.");
            }

            userData = { name, email };
            document.getElementById('user-form').style.display = 'none';
            document.getElementById('quiz-actual-content').style.display = 'block';
            
            loadData(currentUrl, currentTitle);
        }

        // SUBSTITUIÇÃO DA LÓGICA DE CARREGAMENTO PARA JSON (USANDO PAPAPARSE)
        function loadData(url, titulo) {
            document.getElementById('quiz-core').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('loading-status').style.display = 'block';
            document.getElementById('current-title').innerText = titulo;

            const csvUrl = url.replace('/pubhtml', '/pub?output=csv');

            Papa.parse(csvUrl, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const rows = results.data;
                    
                    questions = rows.slice(1).map(row => {
                        if (row && row.length >= 6) {
                            return {
                                q: row[0].trim(),
                                options: [
                                    row[1].trim(), 
                                    row[2].trim(), 
                                    row[3].trim(), 
                                    row[4].trim()
                                ],
                                correct: parseInt(row[5]),
                                exp: row[6] ? row[6].trim() : "Sem comentário técnico."
                            };
                        }
                        return null;
                    }).filter(q => q !== null);

                    answers = new Array(questions.length).fill(null);
                    currentIdx = 0; 
                    timeLeft = 7200;
                    document.getElementById('loading-status').style.display = 'none';
                    document.getElementById('quiz-core').style.display = 'block';
                    startTimer(); 
                    renderQ();
                },
                error: function() {
                    alert("Erro ao carregar os dados. Verifique a publicação da planilha.");
                }
            });
        }

        function startTimer() {
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                const h = Math.floor(timeLeft / 3600), m = Math.floor((timeLeft % 3600) / 60), s = timeLeft % 60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(timeLeft <= 0) finishQuiz();
                timeLeft--;
            }, 1000);
        }

        function renderQ() {
            const q = questions[currentIdx];
            document.getElementById('questionNumber').innerText = `Questão ${currentIdx + 1} de ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = "";
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = `option-card ${answers[currentIdx] === i ? 'selected' : ''}`;
                div.innerText = `${String.fromCharCode(65+i)}) ${opt}`;
                div.onclick = () => { answers[currentIdx] = i; renderQ(); };
                grid.appendChild(div);
            });
            document.getElementById('next-btn').style.display = currentIdx === questions.length - 1 ? 'none' : 'inline-block';
            document.getElementById('finish-btn').style.display = currentIdx === questions.length - 1 ? 'inline-block' : 'none';
        }

        function nextQ() { currentIdx++; renderQ(); }
        function prevQ() { if(currentIdx > 0) { currentIdx--; renderQ(); } }

        function finishQuiz() {
            clearInterval(timerInt);
            document.getElementById('quiz-core').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let score = 0, reviewHtml = "";
            questions.forEach((q, i) => {
                if(answers[i] === q.correct) score++;
                else {
                    reviewHtml += `<div class="review-box">
                        <strong>${i+1}. ${q.q}</strong><br>
                        <span style="color:red">Sua: ${answers[i] !== null ? q.options[answers[i]] : 'Em branco'}</span> | 
                        <span style="color:green">Correta: ${q.options[q.correct]}</span>
                    </div>`;
                }
            });
            const percent = (score / questions.length) * 100;
            const status = percent >= 80 ? "APROVADO" : "REPROVADO";
            document.getElementById('score-text').innerText = `${score}/${questions.length} (${percent.toFixed(1)}%)`;
            document.getElementById('feedback-msg').innerHTML = `<h2 style="color:${percent >= 80 ? 'green':'red'}">${status}</h2>`;
            document.getElementById('review-area').innerHTML = "<h4>Revisão de Erros:</h4>" + (reviewHtml || "Parabéns! Gabaritou.");
            
            new Chart(document.getElementById('scoreChart'), {
                type: 'doughnut',
                data: { labels: ['Acertos', 'Erros'], datasets: [{ data: [score, questions.length - score], backgroundColor: ['#27ae60', '#d63031'] }] }
            });

            document.getElementById('mail-status').innerText = "Enviando resultados ao professor...";
            emailjs.send('service_sdilgy9', 'template_w7hgwhu', {
                student_name: userData.name,
                student_email: userData.email,
                subject: currentTitle,
                result: `${score}/${questions.length} (${percent.toFixed(1)}%)`,
                status: status
            }).then(() => {
                document.getElementById('mail-status').innerText = "✅ Enviado com sucesso!";
            }).catch(() => {
                document.getElementById('mail-status').innerText = "❌ Falha no envio automático.";
            });
        }
    </script>
</body>
</html>
